<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BPM 簽核行為 AI 鑑別系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@latest/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-weight: bold; margin-bottom: 15px; font-size: 1.1em; color: #555; }
        
        .btn { padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; border: none; transition: 0.3s; margin-right: 10px; }
        .btn-primary { background-color: #1a73e8; color: white; }
        .btn-primary:hover { background-color: #1557b0; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .status-tag { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; background: #eee; font-weight: bold; }
        .ready { background: #e6f4ea; color: #1e8e3e; }

        .slider-group { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        input[type=range] { flex-grow: 1; }

        #upload-area { border: 2px dashed #1a73e8; padding: 30px; text-align: center; color: #1a73e8; border-radius: 8px; cursor: pointer; background: #f8fbff; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f8f9fa; padding: 12px; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr.anomaly-row { background-color: #fff5f5; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>BPM 簽核行為 AI 鑑別系統</h1>

    <div class="card">
        <div class="card-title">1. 環境與模型準備</div>
        <button id="btnLoadModel" class="btn btn-primary">載入 AI 模型</button>
        <span id="modelStatus" class="status-tag">尚未載入</span>
    </div>

    <div class="card">
        <div class="card-title">2. 設定鑑定靈敏度 (MSE 閥值)</div>
        <div class="slider-group">
            <span>嚴格</span>
            <input type="range" id="mseSlider" min="0.001" max="0.3" step="0.005" value="0.05">
            <span>寬鬆</span>
        </div>
        <div>建議值：0.05 | 當前設定：<span id="mseVal" style="color:#1a73e8; font-weight:bold;">0.050</span></div>
    </div>

    <div class="card">
        <div class="card-title">3. 資料來源</div>
        <div id="upload-area">點擊或拖曳待鑑別之 .xlsx 檔案至此</div>
        <input type="file" id="fileInput" accept=".xlsx" style="display:none">
        <span id="fileStatus" class="status-tag">尚未選擇檔案</span>
    </div>

    <div class="card" style="text-align: center; border: none;">
        <button id="btnRunAudit" class="btn btn-success" style="font-size: 20px; padding: 15px 50px;" disabled>
            🚀 執行 AI 鑑測分析
        </button>
    </div>

    <div class="card">
        <div class="card-title">4. 鑑測結果報告</div>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>表單類型</th>
                    <th>表單編號</th>
                    <th>申請日期</th>
                    <th>完成簽核日期</th>
                    <th>異常分數 (MSE)</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="5" style="text-align:center; color:#999;">請先完成上述步驟並執行鑑測</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let model;
    let workbookData;
    let threshold = 0.05;

    // 靈敏度調整
    document.getElementById('mseSlider').oninput = function() {
        threshold = parseFloat(this.value);
        document.getElementById('mseVal').innerText = threshold.toFixed(3);
    };

    // 1. 載入模型
    document.getElementById('btnLoadModel').onclick = async function() {
        try {
            const topRes = await fetch('./bpm_model_topology.json');
            const wgtRes = await fetch('./bpm_model_weights.json');
            const topology = await topRes.json();
            const weights = await wgtRes.json();
            const weightData = Uint8Array.from(atob(weights.weightData), c => c.charCodeAt(0)).buffer;

            model = await tf.loadLayersModel(tf.io.fromMemory(topology, weights.weightSpecs, weightData));
            
            document.getElementById('modelStatus').innerText = "模型載入成功";
            document.getElementById('modelStatus').classList.add('ready');
            this.disabled = true;
            checkReadyToRun();
        } catch (e) {
            alert("模型載入失敗，請確認是否執行 Local Server 且檔案存在。");
        }
    };

    // 2. 檔案選取
    const area = document.getElementById('upload-area');
    const input = document.getElementById('fileInput');
    area.onclick = () => input.click();

    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            workbookData = XLSX.read(data, { type: 'array' });
            document.getElementById('fileStatus').innerText = "檔案讀取成功: " + file.name;
            document.getElementById('fileStatus').classList.add('ready');
            checkReadyToRun();
        };
        reader.readAsArrayBuffer(file);
    };

    function checkReadyToRun() {
        if (model && workbookData) {
            document.getElementById('btnRunAudit').disabled = false;
        }
    }

    // 3. 執行鑑測
    document.getElementById('btnRunAudit').onclick = function() {
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>分析中，請稍候...</td></tr>";

        setTimeout(() => {
            const results = [];
            
            workbookData.SheetNames.forEach(name => {
                const sheet = workbookData.Sheets[name];
                const rows = XLSX.utils.sheet_to_json(sheet, { range: 2 });

                rows.forEach(row => {
                    const d1Raw = row['申請日期'];
                    const d2Raw = row['上次簽核日期'];

                    if (d1Raw && d2Raw) {
                        const mse = runInference(d1Raw, d2Raw);
                        if (mse >= threshold) {
                            results.push({
                                type: name,
                                id: row['表單編號'] || 'N/A',
                                d1: d1Raw,
                                d2: d2Raw,
                                score: mse
                            });
                        }
                    }
                });
            });

            renderResults(results);
        }, 100);
    };

    function runInference(applyVal, finishVal) {
        const toDate = (v) => {
            if (typeof v === 'number') return new Date(Math.round((v - 25569) * 86400 * 1000));
            return new Date(v);
        };

        const d1 = toDate(applyVal);
        const d2 = toDate(finishVal);
        if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;

        const h = d1.getHours() / 24;
        const w = d1.getDay() / 7;
        const dur = Math.min(((d2 - d1) / 60000) / 1440, 1.0);

        const input = tf.tensor2d([[h, w, dur]]);
        const output = model.predict(input);
        const mse = tf.losses.meanSquaredError(input, output).dataSync()[0];
        
        input.dispose();
        output.dispose();
        return mse;
    }

    // 💡 已修正：移除重複的 'f'
    function renderResults(data) {
        const tbody = document.querySelector('#resultTable tbody');
        if (data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:green;'>✅ 鑑測完成：未發現任何異常。</td></tr>";
            return;
        }

        const formatDateDisplay = (val) => {
            let d;
            if (typeof val === 'number') {
                d = new Date(Math.round((val - 25569) * 86400 * 1000));
            } else {
                d = new Date(val);
            }
            
            if (isNaN(d.getTime())) return val;

            const Y = d.getFullYear();
            const M = String(d.getMonth() + 1).padStart(2, '0');
            const D = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            return `${Y}/${M}/${D} ${hh}:${mm}:${ss}`;
        };

        tbody.innerHTML = "";
        data.sort((a, b) => b.score - a.score);
        
        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = "anomaly-row";
            tr.innerHTML = `
                <td>${item.type}</td>
                <td>${item.id}</td>
                <td>${formatDateDisplay(item.d1)}</td>
                <td>${formatDateDisplay(item.d2)}</td>
                <td>${item.score.toFixed(6)}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
